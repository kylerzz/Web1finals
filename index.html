<DOCTYPE html>
<html lang="en">
<head>

    <title>Buttons</title>
    <style>
        .subscribe-button{
            background-color: rgb(145, 36, 9);
            color: rgb(221, 248, 248);
            border: none;
            height: 36px;
            width: 105px;
            border-radius: 5px;
            cursor: pointer;
            transition: 1s;

        }
        .subscribe-button:hover {
            opacity: 0.5;
            box-shadow: 0px 5px 10px black;
        }
        .subscribe-button:active {
            opacity: 0.5;
        }
        .join-button {
        
            background-color: rgb(17, 17, 226);
            color: aliceblue;
            border: solid;
            border-width: 1px;
            height: 36px;
            width: 60px;
            border-radius: 5px;
            cursor: pointer;
            transition: 1s;

        }
        .join-button:hover {
            opacity: 0.5;
            box-shadow: 0px 5px 10px black;
        }
        .join-button:active {
            opacity: 0.5;
        }
        .tweet-button {
            background-color: rgb(27, 104, 221);
            color: aliceblue;
            border: solid;
            border-width: 1px;
            height: 36px;
            width: 60px;
            border-radius: 5px;
            cursor: pointer;
            transition: 1s;
        }
        .tweet-button:hover {
            opacity: 0.5;
            box-shadow: 0px 5px 10px black;
        }
        .tweet-button:active {
            opacity: 0.5;
        }


    </style>
</head>
<body>
    <button class="subscribe-button"> SUBSCRIBE</button>
    <button class="join-button"> JOIN</button>
    <button class="tweet-button"> TWEET</button>
